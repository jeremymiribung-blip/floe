name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual build reason"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis,msi
            name: Windows
          - os: ubuntu-latest
            bundles: deb,appimage,rpm
            name: Linux
          - os: macos-latest
            bundles: dmg
            name: macOS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libdbus-1-dev \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-build quality checks
        run: |
          pnpm format
          pnpm lint
          pnpm exec tsc --noEmit
          pnpm test
          cargo fmt --manifest-path src-tauri/Cargo.toml --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml

      - name: Warn if signing secrets are missing
        run: |
          echo "::warning::Code signing secrets are not fully configured. Building UNSIGNED bundle."

      - name: Build Tauri app
        run: pnpm tauri build --bundles ${{ matrix.bundles }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find src-tauri/target/release/bundle -type f \( \
            -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o \
            -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \
          \) -exec cp {} artifacts/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: floe-${{ matrix.name }}
          path: artifacts/

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Floe ${{ github.ref_name }}
          body: "See CHANGELOG.md for changes."
          draft: true
          files: |
            floe-*/*
